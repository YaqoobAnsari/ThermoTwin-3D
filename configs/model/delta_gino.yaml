name: delta_gino           # GINO that predicts a correction on the analytic 1-D theta prior
in_channels: 4             # per-point features: [logk_std, r_si, r_se, theta1d]
out_channels: 1            # dimensionless temperature field theta (must be 1 for delta learning)
gno_coord_dim: 3           # 3-D as-built geometry
fno_in_channels: 32        # latent (FNO) channel width; free of in_channels (nonlinear in-GNO)
fno_n_modes: [8, 8, 8]     # retained Fourier modes per latent axis; each must be < latent_grid // 2
fno_hidden_channels: 64
fno_n_layers: 4
in_gno_radius: 0.05        # input-GNO neighbourhood radius in normalised [0,1] coords
out_gno_radius: 0.05       # output-GNO neighbourhood radius in normalised [0,1] coords
latent_grid: 16            # side length G of the cubic latent grid (validates n_modes < G//2)
latent_feature_channels: 1 # the SDF, fed on the latent grid as latent_features
in_gno_transform_type: nonlinear   # decouples feature width from latent width (the verified fix)
out_gno_transform_type: linear
gno_use_open3d: false   # native torch search runs on GPU; Open3D here is CPU-only (no CUDA build)
# Forward = query_prior + gino_correction. query_prior is the analytic 1-D theta at each
# output query's through-wall coordinate, supplied per-query by the Block-2 dataset
# (mirrors delta_fno's additive structure). Built via thermotwin.models.build_delta_gino.
